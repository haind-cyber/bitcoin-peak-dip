---
layout: default
---
<div class="learn-article">
    <div class="article-header">
        <h1 class="article-title">{{ page.title }}</h1>
        <div class="article-meta">
            <span class="article-author"><i class="fas fa-user"></i> {{ page.author }}</span>
            <span class="article-date"><i class="fas fa-calendar-alt"></i> {{ page.date | date: "%B %d, %Y" }}</span>
            <span class="reading-time"><i class="fas fa-clock"></i> {{ page.reading_time }} min read</span>
            <span class="difficulty {{ page.level | downcase }}">{{ page.level | default: 'Beginner' }}</span>
        </div>
    </div>
    
    <!-- Article Layout with Outline Sidebar -->
    <div class="article-with-outline">
        <!-- Outline Sidebar (hiện trên desktop) -->
        <aside class="article-outline" id="articleOutline">
            <div class="outline-header">
                <i class="fas fa-list-ul"></i>
                <h3>Contents</h3>
            </div>
            <ul class="outline-list" id="outlineList">
                <li class="loading-outline">Loading...</li>
            </ul>
        </aside>
        
        <!-- Nội dung chính -->
        <div class="article-content" id="articleContent">
            {{ content }}
        </div>
    </div>
    
    <!-- Outline cho mobile (dropdown) -->
    <div class="mobile-outline">
        <button class="mobile-outline-toggle" id="mobileOutlineToggle">
            <i class="fas fa-list-ul"></i>
            <span>Table of Contents</span>
            <i class="fas fa-chevron-down"></i>
        </button>
        <div class="mobile-outline-menu" id="mobileOutlineMenu">
            <ul class="outline-list" id="mobileOutlineList">
                <li class="loading-outline">Loading...</li>
            </ul>
        </div>
    </div>
    
    <!-- Article Footer -->
    <div class="article-footer-nav">
        <a href="{{ '/learn' | relative_url }}" class="back-to-learn">
            <i class="fas fa-arrow-left"></i> Back to Knowledge Base
        </a>
        <button class="share-article" onclick="shareArticle()">
            <i class="fas fa-share-alt"></i> Share
        </button>
        <button class="article-action-btn" onclick="window.articleManager?.addCurrentToReadingList()" title="Save to reading list">
            <i class="fas fa-bookmark"></i>
        </button>
    </div>
</div>

<!-- JavaScript cho Outline -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    generateOutline();
    setupMobileOutline();
    setupReadingProgress();
});

function generateOutline() {
    const content = document.getElementById('articleContent');
    if (!content) return;
    
    const headings = content.querySelectorAll('h2, h3');
    if (headings.length === 0) return;
    
    const outlineList = document.getElementById('outlineList');
    const mobileOutlineList = document.getElementById('mobileOutlineList');
    
    if (!outlineList && !mobileOutlineList) return;
    
    let outlineHTML = '';
    let mobileOutlineHTML = '';
    
    headings.forEach((heading, index) => {
        if (!heading.id) {
            heading.id = `section-${index}`;
        }
        
        const level = heading.tagName === 'H2' ? 'h2' : 'h3';
        const text = heading.textContent;
        const indent = level === 'h3' ? 'style="margin-left: 20px;"' : '';
        
        outlineHTML += `
            <li class="outline-item outline-${level}" ${indent}>
                <a href="#${heading.id}" onclick="smoothScroll(event, '${heading.id}')">
                    ${level === 'h2' ? '<i class="fas fa-circle"></i>' : '<i class="fas fa-circle-small"></i>'} 
                    ${text}
                </a>
            </li>
        `;
        
        mobileOutlineHTML += `
            <li class="outline-item outline-${level}" ${indent}>
                <a href="#${heading.id}" onclick="smoothScroll(event, '${heading.id}'); closeMobileOutline();">
                    ${level === 'h2' ? '<i class="fas fa-circle"></i>' : '<i class="fas fa-circle-small"></i>'} 
                    ${text}
                </a>
            </li>
        `;
    });
    
    if (outlineList) outlineList.innerHTML = outlineHTML;
    if (mobileOutlineList) mobileOutlineList.innerHTML = mobileOutlineHTML;
    
    setupActiveSectionHighlight(headings);
}

function smoothScroll(event, id) {
    event.preventDefault();
    const element = document.getElementById(id);
    if (element) {
        element.scrollIntoView({ behavior: 'smooth' });
    }
}

function setupMobileOutline() {
    const toggle = document.getElementById('mobileOutlineToggle');
    const menu = document.getElementById('mobileOutlineMenu');
    
    if (!toggle || !menu) return;
    
    toggle.addEventListener('click', function() {
        menu.classList.toggle('active');
        const icon = this.querySelector('.fa-chevron-down');
        if (icon) {
            icon.style.transform = menu.classList.contains('active') ? 'rotate(180deg)' : '';
        }
    });
    
    document.addEventListener('click', function(event) {
        if (!toggle.contains(event.target) && !menu.contains(event.target)) {
            menu.classList.remove('active');
            const icon = toggle.querySelector('.fa-chevron-down');
            if (icon) {
                icon.style.transform = '';
            }
        }
    });
}

function closeMobileOutline() {
    const menu = document.getElementById('mobileOutlineMenu');
    const toggle = document.getElementById('mobileOutlineToggle');
    if (menu) menu.classList.remove('active');
    if (toggle) {
        const icon = toggle.querySelector('.fa-chevron-down');
        if (icon) icon.style.transform = '';
    }
}

function setupActiveSectionHighlight(headings) {
    if (!headings || headings.length === 0) return;
    
    window.addEventListener('scroll', function() {
        let current = '';
        const scrollPosition = window.scrollY + 100;
        
        for (let i = headings.length - 1; i >= 0; i--) {
            const heading = headings[i];
            const headingTop = heading.offsetTop;
            
            if (scrollPosition >= headingTop) {
                current = heading.id;
                break;
            }
        }
        
        document.querySelectorAll('.outline-item a').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href') === `#${current}`) {
                link.classList.add('active');
            }
        });
    });
}

function setupReadingProgress() {
    const progressBar = document.createElement('div');
    progressBar.className = 'reading-progress';
    progressBar.innerHTML = '<div class="progress-bar" id="readingProgress"></div>';
    document.body.appendChild(progressBar);
    
    window.addEventListener('scroll', function() {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        
        const progress = document.getElementById('readingProgress');
        if (progress) {
            progress.style.width = scrolled + '%';
        }
    });
}

function shareArticle() {
    const title = document.querySelector('.article-title')?.textContent || 'Bitcoin PeakDip Article';
    const url = window.location.href;
    
    if (navigator.share) {
        navigator.share({
            title: title,
            text: 'Check out this article from Bitcoin PeakDip',
            url: url
        });
    } else {
        navigator.clipboard.writeText(url);
        if (window.Shared) {
            window.Shared.showToast('Link copied to clipboard!', 'success');
        } else {
            alert('Link copied to clipboard!');
        }
    }
}
</script>
