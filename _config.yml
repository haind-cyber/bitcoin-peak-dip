# ============================================
# Bitcoin PeakDip - Jekyll Configuration
# Version: 1.12.2
# ============================================

title: "Bitcoin PeakDip"
tagline: "A Specialized Bitcoin Quantitative Research & Early Warning System Provider"
description: "Bitcoin PeakDip: Early Warning System (EWS) for Bitcoin Peaks and Dips | AI-Powered"
url: ""
baseurl: ""  # Để trống cho local development
repository: "haind-cyber/bitcoin-peak-dip"

# ===== BUILD SETTINGS =====
markdown: kramdown
highlighter: rouge
permalink: /learn/:year/:month/:day/:title.html
timezone: Asia/Ho_Chi_Minh

# ===== PLUGINS =====
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ===== FEED SETTINGS =====
feed:
  path: feed.xml
  posts_limit: 20

# ===== DEFAULTS =====
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Bitcoin PeakDip Team"
      reading_time: 5
      level: "Beginner"
      icon: "book"
      
  - scope:
      path: "about.md"
    values:
      layout: "page"
      title: "About Bitcoin PeakDip"
      
  - scope:
      path: "product.md"
    values:
      layout: "page"
      title: "Product Suite - Bitcoin PeakDip"
      
  - scope:
      path: "signals.md"
    values:
      layout: "page"
      title: "EWS Signals - Bitcoin PeakDip"
      
  - scope:
      path: "learn.md"
    values:
      layout: "page"
      title: "Knowledge Base - Bitcoin PeakDip"

# ===== EXCLUDE =====
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - README.md
  - "*.gem"
  - "*.sh"

# ===== CUSTOM VARIABLES =====
version: "1.12.2"
build_date: "{{ site.time | date: '%Y-%m-%d' }}"
google_analytics: "G-HR78BDQYJJ"