# .github/workflows/notify-on-push.yml
name: 📢 Bitcoin PeakDip Notification System

on:
  push:
    branches: [btcpeakdip, main, master]
    paths:
      - '_site/learn/**'
      - '_posts/**'
      - 'assets/data/articles.json'
  workflow_dispatch: # Cho phép chạy manual
    inputs:
      force_notify:
        description: 'Force send notifications'
        required: false
        default: 'false'

jobs:
  detect-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: btcpeakdip
      
      - name: 🔍 Find new HTML files
        id: detect
        run: |
          echo "=== 🔍 Searching for new HTML files ==="
          
          # Xác định files mới
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.force_notify }}" == "true" ]; then
            # Force mode: lấy tất cả HTML files trong 7 ngày gần nhất
            echo "📋 Force mode: Finding recent HTML files..."
            FILES=$(find _site/learn -name "*.html" -type f -mtime -7 2>/dev/null | head -20 || true)
          else
            # Normal mode: chỉ lấy files mới trong commit
            echo "📋 Normal mode: Finding new files in commit..."
            FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD | grep '\.html$' | grep -v 'index\.html' | head -20 || true)
          fi
          
          # Đếm số lượng
          COUNT=$(echo "$FILES" | grep -v '^$' | wc -l)
          
          if [ $COUNT -gt 0 ]; then
            echo "✅ Found $COUNT new file(s)"
            echo "found=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            
            # Ghi danh sách files
            {
              echo "files<<EOF"
              echo "$FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            
            # Tạo danh sách articles với metadata
            ARTICLES=""
            while IFS= read -r file; do
              if [ -n "$file" ] && [ -f "$file" ]; then
                filename=$(basename "$file" .html)
                
                # Trích xuất title với nhiều phương pháp
                title=$(grep -o '<title>[^<]*</title>' "$file" 2>/dev/null | sed 's/<title>\(.*\)<\/title>/\1/' | head -1)
                if [ -z "$title" ]; then
                  title=$(grep -o '<h1[^>]*>[^<]*</h1>' "$file" 2>/dev/null | sed 's/<h1[^>]*>\(.*\)<\/h1>/\1/' | head -1)
                fi
                if [ -z "$title" ]; then
                  title=$(echo "$filename" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)} 1')
                fi
                
                # Trích xuất description
                description=$(grep -o '<meta name="description" content="[^"]*"' "$file" 2>/dev/null | sed 's/<meta name="description" content="\([^"]*\)".*/\1/' | head -1)
                
                # Tạo URL
                clean_file=$(echo "$file" | sed 's/^_site\///')
                url="https://bitcoin-peak-dip.com/$clean_file"
                
                # Thêm vào danh sách
                ARTICLES="${ARTICLES}${file}|${title}|${url}|${description}\n"
                echo "  📄 $title"
              fi
            done <<< "$FILES"
            
            {
              echo "articles<<EOF"
              printf "%b" "$ARTICLES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            
          else
            echo "❌ No new HTML files found"
            echo "found=false" >> $GITHUB_OUTPUT
          fi
      
      - name: ⏹️ Skip if no new files
        if: steps.detect.outputs.found != 'true'
        run: echo "No new files, skipping notification"
      
      - name: ⚙️ Setup Node.js
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: 📦 Install dependencies
        if: steps.detect.outputs.found == 'true'
        run: |
          npm ci --only=production --no-audit --no-fund
          npm list --depth=0
      
      - name: 🔥 Decode Firebase credentials
        if: steps.detect.outputs.found == 'true'
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=firebase-credentials.json" >> $GITHUB_ENV
      
      - name: 📨 Send notifications
        if: steps.detect.outputs.found == 'true'
        env:
          FILES: ${{ steps.detect.outputs.files }}
          ARTICLES: ${{ steps.detect.outputs.articles }}
          FILE_COUNT: ${{ steps.detect.outputs.count }}
          DISCORD_PUBLIC_WEBHOOK: ${{ secrets.DISCORD_PUBLIC_WEBHOOK }}
          DISCORD_PRIVATE_WEBHOOK: ${{ secrets.DISCORD_PRIVATE_WEBHOOK }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          NODE_ENV: production
        run: node scripts/send-notification-from-html.js
      
      - name: 🧹 Cleanup
        if: always()
        run: rm -f firebase-credentials.json
      
      - name: 📊 Summary
        if: always()
        run: |
          echo "## 📊 Notification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📄 Files found | ${{ steps.detect.outputs.count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔔 Discord | ✅ Sent |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 FCM | ✅ Sent |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Badge | ✅ Updated |" >> $GITHUB_STEP_SUMMARY