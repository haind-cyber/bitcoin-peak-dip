name: 📢 Send Article Notifications

on:
  push:
    branches: [btcpeakdip]

jobs:
  detect-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
        with:
          ref: btcpeakdip
          fetch-depth: 2
      
      # ===== THÊM STEP DEBUG =====
      - name: 🔍 Debug - List all files
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files in learn/ ==="
          find learn -type f -name "*.html" 2>/dev/null || echo "No files found"
          echo "=== Git show last commit ==="
          git show --name-only --pretty=format: HEAD
      
      # ===== SỬA CÁCH DETECT =====
      - name: 🔍 Find new HTML files
        id: detect
        run: |
          # Cách 1: Tìm tất cả HTML files trong learn/ được tạo trong 1 ngày qua
          echo "=== Checking files modified in last 24h ==="
          NEW_HTML=$(find learn -name "*.html" -type f -mtime -1 2>/dev/null || true)
          
          # Cách 2: Nếu không có, dùng git show
          if [ -z "$NEW_HTML" ]; then
            echo "=== No files found with find, trying git show ==="
            NEW_HTML=$(git show --name-only --pretty=format: HEAD | grep 'learn/.*\.html' || true)
          fi
          
          echo "NEW_HTML=$NEW_HTML"
          
          if [ -n "$NEW_HTML" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "files=$NEW_HTML" >> $GITHUB_OUTPUT
            echo "count=$(echo $NEW_HTML | wc -w)" >> $GITHUB_OUTPUT
            
            # Tạo JSON
            ARTICLES_JSON="[]"
            for file in $NEW_HTML; do
              if [ -f "$file" ]; then
                filename=$(basename "$file" .html)
                title=$(grep -o '<title>[^<]*</title>' "$file" | sed 's/<title>\(.*\)<\/title>/\1/' | head -1)
                title=${title:-$filename}
                url_path=${file#_site/}
                url="https://bitcoin-peak-dip.com/$url_path"
                
                echo "Processing: $file -> $title"
                ARTICLES_JSON=$(echo "$ARTICLES_JSON" | jq --arg title "$title" --arg url "$url" '. + [{"title": $title, "url": $url}]')
              fi
            done
            echo "articles=$ARTICLES_JSON" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 📝 Show results
        run: |
          echo "Found: ${{ steps.detect.outputs.found }}"
          echo "Files: ${{ steps.detect.outputs.files }}"
          echo "Articles: ${{ steps.detect.outputs.articles }}"
      
      - name: ⏹️ Skip if no new HTML
        if: steps.detect.outputs.found != 'true'
        run: echo "No new HTML files, skipping"
      
      - name: ⚙️ Setup Node.js
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📦 Install dependencies
        if: steps.detect.outputs.found == 'true'
        run: |
          npm init -y
          npm install firebase-admin@11 axios@1.5
      
      - name: 📨 Send notifications
        if: steps.detect.outputs.found == 'true'
        env:
          ARTICLES: ${{ steps.detect.outputs.articles }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DISCORD_PUBLIC_WEBHOOK: ${{ secrets.DISCORD_PUBLIC_WEBHOOK }}
          DISCORD_PRIVATE_WEBHOOK: ${{ secrets.DISCORD_PRIVATE_WEBHOOK }}
        run: node scripts/send-notification-from-html.js