name: 📢 Send Article Notifications

on:
  push:
    branches: [btcpeakdip]

jobs:
  detect-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
        with:
          ref: btcpeakdip
          fetch-depth: 2
      
      # ===== BƯỚC 1: TÌM FILE HTML MỚI =====
      - name: 🔍 Find new HTML files
        id: detect
        run: |
          echo "=== 🔍 Searching for new HTML files ==="
          
          # Cách 1: Tìm file HTML trong learn/ được tạo/sửa trong 24h qua
          echo "Checking files modified in last 24h..."
          HTML_FILES=$(find learn -name "*.html" -type f -mtime -1 2>/dev/null || true)
          
          # Cách 2: Nếu không có, tìm trong _site/learn/
          if [ -z "$HTML_FILES" ]; then
            echo "No files in learn/, checking _site/learn/..."
            HTML_FILES=$(find _site/learn -name "*.html" -type f -mtime -1 2>/dev/null || true)
          fi
          
          # Cách 3: Nếu vẫn không có, dùng git show để tìm file trong commit hiện tại
          if [ -z "$HTML_FILES" ]; then
            echo "Using git show to find files in current commit..."
            HTML_FILES=$(git show --name-only --pretty=format: HEAD | grep 'learn/.*\.html' || true)
          fi
          
          # Cách 4: Cuối cùng, tìm tất cả file HTML (fallback)
          if [ -z "$HTML_FILES" ]; then
            echo "Fallback: finding all HTML files..."
            HTML_FILES=$(find learn -name "*.html" -type f 2>/dev/null | head -10 || true)
          fi
          
          if [ -n "$HTML_FILES" ]; then
            COUNT=$(echo "$HTML_FILES" | wc -l)
            echo "found=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            
            # Ghi danh sách files (dùng delimiter để tránh lỗi format)
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$HTML_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            echo "✅ Found $COUNT HTML file(s):"
            echo "$HTML_FILES"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "❌ No new HTML files found"
          fi
      
      # ===== BƯỚC 2: HIỂN THỊ KẾT QUẢ =====
      - name: 📝 Show detection results
        run: |
          echo "Found: ${{ steps.detect.outputs.found }}"
          echo "Count: ${{ steps.detect.outputs.count }}"
          echo "Files:"
          echo "${{ steps.detect.outputs.files }}"
      
      # ===== BƯỚC 3: SKIP NẾU KHÔNG CÓ FILE MỚI =====
      - name: ⏭️ Skip if no new HTML files
        if: steps.detect.outputs.found != 'true'
        run: |
          echo "⏭️ No new HTML files found, skipping notification"
          echo "✅ Workflow completed successfully (no action needed)"
      
      # ===== BƯỚC 4: GỬI NOTIFICATION (CHỈ KHI CÓ FILE MỚI) =====
      - name: ⚙️ Setup Node.js
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📦 Install dependencies
        if: steps.detect.outputs.found == 'true'
        run: |
          echo "Installing dependencies..."
          npm init -y
          npm install firebase-admin@11 axios@1.5
          echo "✅ Dependencies installed"
      
      - name: 🔐 Decode Firebase credentials
        if: steps.detect.outputs.found == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "Decoding Firebase credentials..."
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "✅ Firebase credentials available"
          else
            echo "⚠️ Firebase credentials not found"
          fi
      
      - name: 📨 Send notifications
        if: steps.detect.outputs.found == 'true'
        env:
          FILES: ${{ steps.detect.outputs.files }}
          ARTICLES: ${{ steps.detect.outputs.files }}  # THÊM DÒNG NÀY
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DISCORD_PUBLIC_WEBHOOK: ${{ secrets.DISCORD_PUBLIC_WEBHOOK }}
          DISCORD_PRIVATE_WEBHOOK: ${{ secrets.DISCORD_PRIVATE_WEBHOOK }}
        run: |
          echo "🚀 Sending notifications..."
          node scripts/send-notification-from-html.js
          echo "✅ Notifications sent"      
      # ===== BƯỚC 5: CLEANUP =====
      - name: 🧹 Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up temporary files..."
          # Không cần cleanup đặc biệt
          echo "✅ Workflow completed"