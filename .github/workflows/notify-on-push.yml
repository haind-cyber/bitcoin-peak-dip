name: 📢 Send Article Notifications

on:
  push:
    paths:
      - '_posts/**/*.md'
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: 🔍 Get changed files
        id: files
        uses: tj-actions/changed-files@v35
        with:
          files: |
            _posts/**/*.md
          separator: " "
      
      - name: ⏹️ Skip if no new files
        if: steps.files.outputs.added_files == ''
        run: echo "No new files, skipping"
      
      - name: ⚙️ Setup Node.js
        if: steps.files.outputs.added_files != ''
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📦 Install dependencies
        if: steps.files.outputs.added_files != ''
        run: |
          npm init -y
          npm install firebase-admin@11 axios@1.5
      
      - name: 📨 Send notifications
        if: steps.files.outputs.added_files != ''
        env:
          ADDED_FILES: ${{ steps.files.outputs.added_files }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DISCORD_PUBLIC_WEBHOOK: ${{ secrets.DISCORD_PUBLIC_WEBHOOK }}
          DISCORD_PRIVATE_WEBHOOK: ${{ secrets.DISCORD_PRIVATE_WEBHOOK }}
        run: node scripts/send-notification.js