name: Generate Articles JSON

on:
  # Chạy khi có push lên branch main
  push:
    branches: [ main, master ]
    paths:
      - '_posts/**'           # Chỉ chạy khi có thay đổi trong _posts
      - '.github/workflows/generate-articles.yml'  # Hoặc khi sửa file workflow
      
  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:

# Quyền cần thiết để commit
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      # Bước 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Bước 2: Setup Ruby
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false # Không cần bundle
      
      # Bước 3: Tạo script generate (ĐÃ FIX LỖI DATE)
      - name: Create generator script
        run: |
          cat > generate_articles.rb << 'EOF'
          require 'yaml'
          require 'json'
          require 'date'
          require 'time'

          # Cấu hình YAML cho phép class Date và Time
          YAML::DEFAULT_OPTION = { permitted_classes: [Date, Time, Symbol] }

          def generate_articles_json
            articles = []
            posts_dir = '_posts'
            
            puts "🔍 Scanning _posts directory..."
            
            unless Dir.exist?(posts_dir)
              puts "❌ Directory #{posts_dir} not found!"
              return false
            end
            
            Dir.glob("#{posts_dir}/*.{md,markdown}").each do |file|
              begin
                content = File.read(file)
                
                if content =~ /^---\s*\n(.*?)\n---\s*\n/m
                  frontmatter_str = $1
                  
                  # CÁCH 1: Dùng YAML.safe_load với permitted_classes (khuyên dùng)
                  begin
                    frontmatter = YAML.safe_load(frontmatter_str, permitted_classes: [Date, Time, Symbol])
                  rescue => e
                    puts "  ⚠️ YAML safe_load failed, trying regular load: #{e.message}"
                    # CÁCH 2: Fallback dùng YAML.load nếu safe_load lỗi
                    frontmatter = YAML.load(frontmatter_str)
                  end
                  
                  filename = File.basename(file, '.*')
                  slug = filename
                  if slug =~ /^\d{4}-\d{2}-\d{2}-(.+)$/
                    slug = $1
                  end
                  
                  # Xử lý ngày tháng an toàn
                  date_str = case frontmatter['date']
                  when Date, Time
                    frontmatter['date'].strftime('%Y-%m-%d')
                  when String
                    begin
                      Date.parse(frontmatter['date']).strftime('%Y-%m-%d')
                    rescue
                      Date.today.strftime('%Y-%m-%d')
                    end
                  else
                    # Trích xuất ngày từ filename nếu không có trong frontmatter
                    if filename =~ /^(\d{4})-(\d{2})-(\d{2})/
                      "#{$1}-#{$2}-#{$3}"
                    else
                      Date.today.strftime('%Y-%m-%d')
                    end
                  end
                  
                  # Lấy description từ frontmatter hoặc content
                  description = frontmatter['description'].to_s
                  if description.empty? && content.length > 0
                    main_content = content.sub(/^---\s*\n.*?\n---\s*\n/m, '').strip
                    description = main_content[0..150] + '...' if main_content.length > 0
                  end
                  
                  # Tạo article object
                  article = {
                    'id' => slug,
                    'slug' => slug,
                    'title' => frontmatter['title'].to_s,
                    'description' => description,
                    'date' => date_str,
                    'author' => frontmatter['author'].to_s.empty? ? 'Bitcoin PeakDip Team' : frontmatter['author'].to_s,
                    'category' => frontmatter['category'].to_s.empty? ? 'General' : frontmatter['category'].to_s,
                    'reading_time' => frontmatter['reading_time'] || 5,
                    'level' => frontmatter['level'].to_s.empty? ? 'Beginner' : frontmatter['level'].to_s,
                    'icon' => frontmatter['icon'].to_s.empty? ? 'book' : frontmatter['icon'].to_s,
                    'featured' => frontmatter['featured'] || false
                  }
                  
                  articles << article
                  puts "  ✅ #{filename}"
                else
                  puts "  ⚠️ No front matter in #{file}"
                end
              rescue => e
                puts "  ❌ Error processing #{file}: #{e.message}"
              end
            end
            
            if articles.empty?
              puts "❌ No articles found!"
              return false
            end
            
            # Sắp xếp theo ngày (mới nhất lên đầu)
            articles.sort_by! { |a| a['date'] }.reverse!
            
            output = {
              'articles' => articles,
              'last_updated' => Time.now.iso8601,
              'total' => articles.length
            }
            
            # Ghi vào _data
            Dir.mkdir('_data') unless Dir.exist?('_data')
            File.write('_data/articles.json', JSON.pretty_generate(output))
            puts "✅ Generated _data/articles.json with #{articles.length} articles"
            
            # Ghi vào assets/data cho web access
            Dir.mkdir('assets/data') unless Dir.exist?('assets/data')
            File.write('assets/data/articles.json', JSON.pretty_generate(output))
            puts "✅ Copied to assets/data/articles.json"
            
            return true
          end

          # Chạy hàm chính
          if generate_articles_json
            puts "✅ Success!"
          else
            puts "❌ Failed!"
            exit 1
          end
          EOF
      
      # Bước 4: Chạy script
      - name: Run generator
        run: ruby generate_articles.rb
      
      # Bước 5: Kiểm tra thay đổi
      - name: Check for changes
        id: git-check
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add _data/articles.json assets/data/articles.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      # Bước 6: Commit và push nếu có thay đổi
      - name: Commit and push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git commit -m "🤖 Auto-update articles.json [skip ci]"
          git push
      
      # Bước 7: Upload artifact (dùng v4)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: articles-data
          path: |
            _data/articles.json
            assets/data/articles.json
          retention-days: 7